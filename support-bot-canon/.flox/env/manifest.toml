version = 1

[install]
python3.pkg-path = "python313"
uv.pkg-path = "uv"
# postgresql client tools only (for psql, pg_dump)
postgresql.pkg-path = "postgresql_16"

[hook]
on-activate = '''
  VENV_DIR="$FLOX_ENV_CACHE/venv"
  if [ ! -d "$VENV_DIR" ]; then
    python3 -m venv "$VENV_DIR"
  fi
'''

[profile]
common = '''
  source "$FLOX_ENV_CACHE/venv/bin/activate"
'''

[options]
systems = ["aarch64-darwin", "x86_64-linux", "aarch64-linux"]
